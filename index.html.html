<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CardBot – 법인카드 AI 도우미</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F8FA; --surface: #FFFFFF; --border: #E4E7EC;
    --primary: #1A56DB; --primary-dark: #1140A6; --primary-light: #EBF0FD;
    --text: #111827; --text-muted: #6B7280;
    --bot-bubble: #F3F4F6; --user-bubble: #1A56DB;
    --success: #16A34A;
  }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--primary); }
  .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; }
  .badge { background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .main { flex: 1; display: flex; overflow: hidden; }
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .doc-loaded { padding: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--success); font-weight: 600; }
  .quick-topics { padding: 12px; flex: 1; overflow-y: auto; }
  .quick-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .topic-tag { display: block; width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text); cursor: pointer; margin-bottom: 6px; transition: all 0.15s; }
  .topic-tag:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text-muted); text-align: center; padding: 40px; }
  .welcome-icon { font-size: 48px; }
  .welcome h2 { font-size: 20px; font-weight: 700; color: var(--text); }
  .welcome p { font-size: 14px; line-height: 1.7; max-width: 360px; }
  .message { display: flex; gap: 10px; max-width: 78%; }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .bot-avatar { background: var(--primary); color: white; }
  .user-avatar { background: #E5E7EB; }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; word-break: break-word; }
  .message.bot .bubble { background: var(--bot-bubble); border-bottom-left-radius: 4px; }
  .message.user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
  .result-label { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .result-ok { background: #DCFCE7; color: #15803D; }
  .result-no { background: #FEE2E2; color: #B91C1C; }
  .result-cond { background: #FEF9C3; color: #92400E; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 10px; margin-bottom: 3px; text-transform: uppercase; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .input-area { border-top: 1px solid var(--border); padding: 16px 24px; background: var(--surface); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 14px; font-family: inherit; resize: none; min-height: 48px; max-height: 120px; outline: none; transition: border-color 0.15s; background: var(--bg); }
  textarea:focus { border-color: var(--primary); }
  textarea::placeholder { color: #9CA3AF; }
  .send-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--primary); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: var(--primary-dark); }
  .send-btn:disabled { background: #D1D5DB; cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 99px; }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">💳</div>
    CardBot
  </div>

</header>
<div class="main">

      <button class="topic-tag" onclick="quickAsk('인터넷 결제 시 영수증은 어떻게 첨부하나요?')">🛒 인터넷 결제</button>
      <button class="topic-tag" onclick="quickAsk('전표 작성 마감일이 언제인가요?')">📅 전표 마감일</button>
      <button class="topic-tag" onclick="quickAsk('결재선 상향 기준을 알려주세요')">📋 결재선 상향</button>
      <button class="topic-tag" onclick="quickAsk('상품권을 법인카드로 구매해도 되나요?')">🎁 상품권 구매</button>
      <button class="topic-tag" onclick="quickAsk('분할결제가 가능한가요?')">✂️ 분할결제</button>
      <button class="topic-tag" onclick="quickAsk('워크샵 비용은 어떤 계정으로 처리하나요?')">🏕️ 워크샵 계정</button>
      <button class="topic-tag" onclick="quickAsk('영수증을 분실했습니다. 어떻게 하나요?')">🧾 영수증 분실</button>
    </div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">💳</div>
        <h2>법인카드 AI 도우미</h2>
        <p>법인카드 사용 기준, 전표 작성, 증빙 서류 등<br>궁금한 사항을 질문해 주세요.<br><br>KT알파 법인카드 매뉴얼(2026.05) 기반으로<br>답변을 제공합니다.</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputBox" placeholder="법인카드 관련 질문을 입력하세요..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
    </div>
  </div>
</div>

const MANUAL_CONTENT = "## Slide 1\n\n2026.05 | \ud68c\uacc4\ud300 \uae40\ud61c\ubbfc\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \uc548\ub0b4 \ubc0f \uc720\uc758 \uc0ac\ud56d\n\n\uae30\uc5c5\ube44\ubc00 II \uae09\n\n## Slide 2\n\nContents\n\n1. \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \uc548\ub0b4\n1.1 \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \ubc0f \uc815\uc0b0\n2 p\n1.2 \uc0ac\uc6a9\uae08\uc9c0 \uac70\ub798 \uc720\ud615\n3 p\n1.3 \uc0ac\uc6a9\uae08\uc9c0 \uc5c5\uc885(\uc2b9\uc778\uc815\ubcf4 \ube68\uac04\uc0c9)\n4 p\n1.4 \uc0ac\uc6a9\uc8fc\uc758(\uc911\uc810\uac80\ud1a0\ub300\uc0c1) \uac70\ub798 \uc720\ud615\n(\uc2b9\uc778\uc815\ubcf4 \ub178\ub780\uc0c9)\n5 p\n1.5 \ub2e4\uc218\uacb0\uc81c(\ubd84\ud560\uacb0\uc81c)(\uc2b9\uc778\uc815\ubcf4 \ud68c\uc0c9)\n6 p\n1.6 \uacb0\uc81c \ucde8\uc18c(\uc2b9\uc778\uc815\ubcf4 \ubd84\ud64d\uc0c9)\n7 p\n2. \uc804\ud45c \uc791\uc131 \uc720\uc758 \uc0ac\ud56d\n2.1 \uacc4\uc815\uacfc\ubaa9 \u2013 \uc5c5\ubb34\ucd94\uc9c4\ube44\n8 p\n2.2 \uacc4\uc815 \ubc0f \uc5c5\uc885\ubcc4 \ud2b9\uc774\uc0ac\ud56d\n9 p\n2.3 \uc99d\ube59 \ucca8\ubd80 \uc0ac\ub840 \n10 p\n2.4 \ubd80\uac00\uc138 \uc815\ubcf4\n11-13 p\n\ucc38\uace0\uc0ac\ud56d\n14 p\nFAQ\n15-17 p\n[\ubcc4\ucca8] \uacc4\uc815\uacfc\ubaa9 \uc815\uc758 \n18-21 p\n\n## Slide 3\n\n1.1 \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \ubc0f \uc815\uc0b0\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \ubc0f \uc815\uc0b0 FLOW\n\n\uad6c\ubd84\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \ubc0f \uc815\uc0b0 FLOW\n\uc804\ud45c \ubbf8\uc791\uc131 \uac74\n\u24601 \ubc95\uc778\uce74\ub4dc \uc2b9\uc778\uc77c\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \ubc0f \uc601\uc218\uc99d \uc218\ucde8\n\uac1c\uc778 \ubc95\uc778\uce74\ub4dc\n\u3147 \uc784\uc9c1\uc6d0 \uac1c\uc778\uba85\uc758 \ubc1c\uae09\uce74\ub4dc\n\u24612 \uc2b9\uc778\uc77c +1\uc77c\n\ubc95\uc778\uce74\ub4dc \uc2b9\uc778\ub0b4\uc5ed \uc870\ud68c \uac00\ub2a5, \uc2b9\uc778\ub0b4\uc5ed \uc120\ud0dd \ud6c4 \ubc95\uc778\uce74\ub4dc \uc804\ud45c \uc791\uc131\n\u3147 \uc804\ud45c \ubbf8\uc791\uc131 \uc2dc,\n(\uc624\uc804 10\uc2dc \uc774\ud6c4)\n\u3147 \uba54\ub274 : KIMS \u2192 \ub9e4\ucd9c/\ube44\uc6a9 \u2192 \ube44\uc6a9\uc804\ud45c(\uc791\uc131) \u2192 \ubc95\uc778\uce74\ub4dc\n\uac1c\uc778 \uacc4\uc88c\uc5d0\uc11c \uc774\uccb4 \ucc98\ub9ac\n\u3147 31\uc77c \uacb0\uc81c\uc758 \uacbd\uc6b0 \uc775\uc6d4 1\uc77c\uc5d0 \uc2b9\uc778\ub0b4\uc5ed \uc870\ud68c \uac00\ub2a5 (\uc870\ud68c \uc2dc \ud574\ub2f9\ub144\uc6d4 \uc7ac\uc124\uc815 \ud544\uc694)\n\uacf5\uc6a9 \ubc95\uc778\uce74\ub4dc\n\u24623 \uc2b9\uc778\uc77c +5 \uc601\uc5c5\uc77c \uc774\ud6c4\n\ud574\ub2f9 \uc2b9\uc778\ub0b4\uc5ed \uc804\ud45c \uc791\uc131 \uae30\uac04 \ub9c8\uac10\n\u3147 \uc7ac\ubb34\ud300\uc73c\ub85c\ubd80\ud130 \ub300\uc5ec\uac00\ub2a5\n\u3147 \ud574\uc678\uacb0\uc81c \ub4f1 \ud2b9\uc815\ubaa9\uc801\uc0ac\uc6a9\n\u24634 \uc775\uc6d4 23\uc77c\n\ubc95\uc778\uce74\ub4dc \uacb0\uc81c\uc77c\n\u3147 \uc804\ud45c \ubbf8\uc791\uc131 \uc2dc,\n\u3147 \uc804\ud45c \uc791\uc131 \uac74 : \ud68c\uc0ac \ube44\uc6a9 \ucc98\ub9ac\n\ud68c\uc0ac \uce74\ub4dc \uc5f0\uccb4 \ubc1c\uc0dd\n\u3147 \uc804\ud45c \ubbf8\uc791\uc131 \uac74 : \uce74\ub4dc\uba85\uc758\uc790 \uacb0\uc81c (\uacc4\uc88c\uc774\uccb4)\n\uce74\ub4dc \uc0ac\uc6a9\uc6d4 \uc804\ud45c\uc791\uc131 \ud544\uc218\n\nKIMS \ubc95\uc778\uce74\ub4dc \uc804\ud45c \uc791\uc131 \uba54\ub274\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9\ub0b4\uc5ed \uc870\ud68c\uac00 \ub418\uc9c0 \uc54a\uc744 \uacbd\uc6b0,\u00a0\ubc95\uc778\uce74\ub4dc \uad00\ub9ac\ub2f4\ub2f9\uc790(\uc7ac\ubb34\ud300)\uc5d0\uac8c \uad8c\ud55c\uc744 \ubd80\uc5ec \ubc1b\uc544\uc57c \ud569\ub2c8\ub2e4.\n\n## Slide 4\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9\uae08\uc9c0\n\n\uad6c\ubd84\n\uc0ac\uc6a9\uae08\uc9c0 \uac70\ub798 \uc720\ud615\n\uc5c5\ubb34 \uc678 \uc6a9\ub3c4\n\ud68c\uc0ac\uac00 \ubd80\ub2f4\ud558\ub294 \uce74\ub4dc\ub300\uae08\uc740 \uc815\uc0c1\uc801\uc778 \uc5c5\ubb34\ubaa9\uc801\uc73c\ub85c \uc0ac\uc6a9\ud55c \uacbd\uc6b0\uc5d0 \ud55c\ud568\n\ub3c4\ubc15 \ubb3c\ud488, \ub2f4\ubc30 \uad6c\uc785 \ub4f1 \uc0ac\uc801 \uc0ac\uc6a9 \uae08\uc9c0\n\ubd88\ubc95\uc5c5\uc18c\n\ub3c4\ubc15, \uc131\ub9e4\ub9e4 \ub4f1\n\ubc95\uc778\uce74\ub4dc\ub97c \ud1b5\ud55c \ud604\uae08\ud654\n\ud558\uc774\ud328\uc2a4\uce74\ub4dc, \uc0c1\ud488\uad8c\ub958, \uce74\ub4dc \ucda9\uc804 \uae08\uc9c0\n* \ub2e8, \uc0c1\ud488\uad8c \uad6c\ub9e4\uac00 \ubd80\ub4dd\uc774\ud558\uac8c \ud544\uc694\ud55c \uacbd\uc6b0, \ubd80\ubb38\uc7a5/\uacbd\uc601\uae30\ud68d\ucd1d\uad04\uc758 \uc2b9\uc778\uc744 \ub4dd\ud55c \uae30\uc548 \ubc0f \uc0c1\ud488\uad8c \uad00\ub9ac\ub300\uc7a5(\uad6c\ub9e4/\uc9c0\uae09\ub0b4\uc5ed \ud3ec\ud568) \ucca8\ubd80 \ud544\uc218\n\uc0ac\uc6a9\uae08\uc9c0 \uc0ac\uc720\n[\uc5c5\ubb34\uc0c1\uc758 \ud6a1\ub839\uacfc \ubc30\uc784]\n\ud615\ubc95 \uc81c355\uc870 2\ud56d \ud6a1\ub839, \ubc30\uc784\n\t\ub2e4\ub978 \uc0ac\ub78c\uc758 \uc0ac\ubb34\ub97c \ub9e1\uc740 \uc0ac\ub78c\uc774 \uadf8 \uc784\ubb34\uc5d0 \ubc18\ud558\ub294 \ud589\uc704\ub85c \uc0ac\uc801\uc73c\ub85c \uc7ac\uc0b0\uc744 \ucde8\ub4dd\ud558\uac70\ub098 \uc81c 3\uc790\uac00 \uc774\ub4dd\uc744 \ucde8\ub4dd\ud558\uac8c \ud558\uc5ec \uc190\ud574\ub97c \uc785\ud788\uba74 \uc131\ub9bd\n\ucc98\ubc8c\n10\ub144 \uc774\ud558\uc758 \uc9d5\uc5ed\uc774\ub098 3,000\ub9cc\uc6d0 \uc774\ud558\uc758 \ubc8c\uae08\n\n\ucc38\uace0. \ud68c\uc0ac\ud45c\uc900 : \ubc95\uc778\uce74\ub4dc\ubc1c\uae09, \uc6b4\uc6a9\uc9c0\uce68\n\n\uad6c\ubd84\n\ud56d\ubaa9\n\uc774\uc6a9 \uc2dc \ud1b5\uc81c/\uc720\uc758\uc0ac\ud56d\n\ubd88\ubc95 \uc5c5\uc18c/\uac00\ub9f9\uc810 \uc0ac\uc6a9\uc740 \uc9c1\uc0c1\uae09\uc790 \uc2b9\uc778\uacfc \uad00\uacc4\uc5c6\uc774 \uc9c0\uae09 \ubd88\uac00\n\ubb3c\ud488 \uad6c\ub9e4\ub294 \ud68c\uc0ac\uc5d0\uc11c \uc815\ud55c \uad6c\ub9e4\ud504\ub85c\uc138\uc2a4 \uc900\uc218\n   - \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \uc5b5\uc81c. \uacbd\uc601\uc9c0\uc6d0\ud300 \uad6c\ub9e4 \ud504\ub85c\uc138\uc2a4 \uc900\uc218\n\ucd9c\uc7a5\ube44 \ub4f1 \uc5ec\ube44\uc9c0\uae09 \uad00\ub828 \uc0ac\uaddc\uac00 \ubcc4\ub3c4\ub85c \uc788\ub294 \uacbd\uc6b0 \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9 \uc720\uc758\n\uc608\uc0b0\ud55c\ub3c4, 1\ud68c \uacb0\uc81c\ud55c\ub3c4 \ub4f1\uc758 \uc0ac\uc720\ub85c \uc778\ud55c \ubd84\ud560 \uacb0\uc81c \uae08\uc9c0\n\uae30\ud0c0 \uc0ac\uaddc \ubc0f \uc0ac\ub0b4 \uc784\uc9c1\uc6d0 \uc724\ub9ac\uaddc\uc815 \uc900\uc218\n\uc0ac\uc6a9 \ubaa8\ub2c8\ud130\ub9c1 \ud504\ub85c\uc138\uc2a4\n\ubd84\uae30 \ub2e8\uc704 \ubc95\uc778\uce74\ub4dc \uc0ac\ud6c4 \ubaa8\ub2c8\ud130\ub9c1 \uc2e4\uc2dc\n- \ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9\uacfc \uc2b9\uc778\uc808\ucc28\uc5d0 \ub300\ud55c \uc801\uc815\uc131 \uac80\uc99d \ubc0f \uac1c\uc778 \uc9d5\uc218 \ub4f1 \ud6c4\uc18d\ucc98\ub9ac \uc9c4\ud589\n\n1.2 \uc0ac\uc6a9\uae08\uc9c0 \uac70\ub798 \uc720\ud615\n\n## Slide 5\n\n1.3 \uc0ac\uc6a9\uae08\uc9c0 \uc5c5\uc885(\uc2b9\uc778\uc815\ubcf4 \ube68\uac04\uc0c9)\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9\uae08\uc9c0 \uc5c5\uc885 \uc720\ud615 \uc608\uc2dc\n\n\ucc38\uace0. KIMS \uc0ac\uc6a9\uae08\uc9c0 \uc5c5\uc885 \uc2b9\uc778 \ub0b4\uc5ed \uc870\ud68c \ud654\uba74\n\n\uad6c\ubd84\n\uc0ac\uc6a9\uae08\uc9c0 \uc5c5\uc885\n\uc804\ud45c \uc791\uc131 \ubd88\uac00\n\u21d2 \uac1c\uc778(\uce74\ub4dc\uba85\uc758\uc790) \ubd80\ub2f4\n\ub2e8, \uc5c5\uc885 \uc624\ubd84\ub958 \ub4f1\uc73c\ub85c \uc804\ud45c \uc791\uc131\uc774 \ud544\uc694\ud55c \uacbd\uc6b0  \ube44\uc6a9\uc804\ud45c(\ube44\uc6a9\uc0dd\uc131(Web)) \ub85c \uc0dd\uc131\ud558\ub418 \uc804\ud45c\uc5d0 \ubd80\ubb38\uc7a5/\uc2e4\uc7a5/\ucd1d\uad04\uae4c\uc9c0 \uacb0\uc7ac \ubc1b\uc740 \uae30\uc548 \ud544\uc218 \ucca8\ubd80\n\uc720\ud765\uc5c5\uc885\n\ub2e8\ub780\uc8fc\uc810, \uc720\ud765\uc8fc\uc810, \ub098\uc774\ud2b8\ud074\ub7fd, \ub178\ub798\ubc29 \ub4f1\n\ub808\uc800\uc5c5\uc885\n\ucd1d\ud3ec\ub958, \uce74\uc9c0\ub178 \ub4f1\n\ubcf4\uac74\uc704\uc0dd\n\uc548\uacbd, \ud53c\ubd80\ubbf8\uc6a9\uc2e4, \ubbf8\uc6a9\uc6d0, \uc774\uc6a9\uad8c, \uc0ac\uc6b0\ub098, \ud654\uc7a5\ud488, \uc548\ub9c8\uc2dc\uc220\uc18c, \uae30\ud0c0\ub300\uc778\uc11c\ube44\uc2a4 \ub4f1\n\uc758\ub8cc\uc5c5\uc885\n\ubcd1/\uc758\uc6d0, \uac74\uac15\uc9c4\ub2e8, \uae30\ud0c0\uc758\ub8cc\uae30\uad00 \ubc0f \uae30\ud0c0\uc758\ub8cc\uae30\uae30, \ub3d9\ubb3c\ubcd1\uc6d0, \uc0b0\ud6c4\uc870\ub9ac\uc6d0, \uc870\uc0b0\uc6d0 \ub4f1\n\ud559\uc6d0\n\uad50\uc721 \uc11c\ube44\uc2a4 \uae30\ud0c0, \uae30\ub2a5\ud559\uc6d0, \uae30\ud0c0\uad50\uc721\uae30\uad00, \ub300\ud559 \ub4f1\ub85d\uae08, \ub3c5\uc11c\uc2e4, \ubcf4\uc2b5\ud559\uc6d0, \uc608\u2022\uccb4\ub2a5\uacc4 \ud559\uc6d0, \uc678\uad6d\uc5b4\ud559\uc6d0, \uc720\uc544\uc6d0, \uc720\uce58\uc6d0, \uc720\ud559\uc6d0, \ucd08\uc911\uace0\uad50\uc721\uae30\uad00, \ucef4\ud4e8\ud130\ud559\uc6d0, \ud559\uc2b5\uc9c0\uad50\uc721 \ub4f1\n\uae30\ud0c0\uc5c5\uc885\n\ub2f4\ubc30\uc790\ud310\uae30, \uc560\uc644\ub3d9\ubb3c, \uc790\ub3d9\ucc28\ud310\ub9e4, \uc131\uc778\uc6a9\ud488, \uc0c1\ud488\uad8c, \uc0c1\ud488\uad8c \uc804\ubb38\ud310\ub9e4, \uc804\uc790\uc0c1\uac70\ub798\uc0c1\ud488\uad8c \ub4f1\n\n## Slide 6\n\n1.4 \uc0ac\uc6a9\uc8fc\uc758(\uc911\uc810\uac80\ud1a0\ub300\uc0c1) \uac70\ub798 \uc720\ud615(\uc2b9\uc778\uc815\ubcf4 \ub178\ub780\uc0c9)\n\n\ubc95\uc778\uce74\ub4dc \uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798 \uc720\ud615\n\n\ucc38\uace0. KIMS \uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798 \uc720\ud615 \ud654\uba74\n\n\uad6c\ubd84\n\uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798 \uc720\ud615\n\uacb0\uc7ac\uc120 \uc0c1\ud5a5 \ud544\uc694 \n\ubc95\uc778\uce74\ub4dc\ubc1c\uae09, \uc6b4\uc6a9\uc9c0\uce68 6\ud56d \ubd80\uc801\uc808\ud55c \uc0ac\uc6a9\uac00\ub2a5\uc131\uc774 \n\ud06c\ubbc0\ub85c \uc0ac\uc6a9\uc790 \ubc0f \uce74\ub4dc\uc0ac\uc6a9 \ub0b4\uc5ed\uc744 \uacb0\uc7ac\ud558\ub294 \uc9c1\uc0c1\uae09\uc790\uc758 \uc5c4\uaca9\ud55c \uac80\ud1a0 \ubc0f \uc2b9\uc778 \ud544\uc694\n\uc0ac\uc6a9 \uae08\uc561\n30\ub9cc\uc6d0 \uc774\uc0c1 \uc0ac\uc6a9\n\uc0ac\uc6a9 \uc77c\uc2dc\n\uc2ec\uc57c\uc2dc\uac04(23:00~06:00) \ubc0f \uadfc\ub85c\uc2dc\uac04 \uc774\uc678 \uc0ac\uc6a9(\uacf5\ud734\uc77c/\ub2e8\uccb4\uc5f0\ucc28\uc77c \ub4f1)\n\uc0ac\uc6a9\uc8fc\uc758\uc5c5\uc885 (\uc7a5\uc18c)\n\ub808\uc800\uc5c5\uc885 : \uace8\ud504\uacbd\uae30\uc7a5, \uace8\ud504\uc5f0\uc2b5\uc7a5, \uace8\ud504\uc6a9\ud488 \uc804\ubb38\uc810, \ud5ec\uc2a4\ud074\ub7fd, \uae30\ud0c0\ub808\uc800\uc5c5\uc18c \ub4f1\n\uc720\ud1b5\uc5c5 : \uba74\uc138\uc810, \uc778\ud130\ub137 Mall, \uc778\ud130\ub137P/G \ub4f1\n\uc219\ubc15\uc5c5 : \ud638\ud154, \ubaa8\ud154, \ub9ac\uc870\ud2b8, \ucf58\ub3c4, \uc5ec\uad00, \uc57c\uc601\uc7a5, \uae30\ud0c0 \uc219\ubc15\uc5c5 \ub4f1\n\uc758\ub958\uc7a1\ud654 : \uac00\ubc29, \uadc0\uae08\uc18d, \ub2e8\uccb4\ubcf5, \ub9de\ucda4\ubcf5\uc810, \uc2a4\ud3ec\uce20\uc758\ub958, \uc2dc\uacc4, \uc2e0\ubc1c, \uc815\uc7a5 \ub4f1\n\uc790\ub3d9\ucc28\uad00\ub828 : \uc138\ucc28\uc7a5, \uc724\ud65c\uc720 \uc804\ubb38 \ud310\ub9e4, \uc790\ub3d9\ucc28 \ubd80\ud488, \uce74\uc778\ud14c\ub9ac\uc5b4 \ub4f1\n\uacf5\ubb34\uc6d0 \uad00\ub828 : \uacf5\ubb34\uc6d0 \uc5f0\uae08 \ub9e4\uc810, \uad6c\ub0b4\ub9e4\uc810(\uad6d\uac00\uae30\uad00 \ub4f1), \uae30\ud0c0\ube44\uc601\ub9ac \uc720\ud1b5 \ub4f1\n\uadfc\ubb34\uc9c0 \uc774\uc678 \uc6d0\uaca9\uc9c0 : \ud1b5\uc0c1 \uc11c\uc6b8 \uc2dc\ub0b4 \uc678 \uc9c0\uc5ed\n\n* \uacb0\uc7ac\uc120 \uc0c1\ud5a5 \uc608\uc2dc : \uc791\uc131\uc790 \u2192 \uc804\ud45c \uc791\uc131\uc790 \ud300\uc7a5/\ubcf8\ubd80\uc7a5(\uc608\uc0b0 \uc0ac\uc6a9 \ubd80\uc11c\uc7a5) \u2192 \uc804\ud45c \uc791\uc131\uc790 \ubcf8\ubd80\uc7a5/\ubd80\ubb38\uc7a5 \u2192 \ud68c\uacc4\ud300\uc6d0 \u2192 \ud68c\uacc4\ud300\uc7a5\n\n\uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798 \uc720\ud615\uc758 \uacbd\uc6b0, \uc2b9\uc778\ub0b4\uc5ed \ub178\ub780\uc0c9 \uc74c\uc601 \ud45c\uae30\n\n\uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798 \uc720\ud615 \uac80\uc99d \ub300\uc0c1\n\n\uc804\ud45c \uc791\uc131 \uc720\uc758 \uc0ac\ud56d\n\n## Slide 7\n\n1.5 \ub2e4\uc218\uacb0\uc81c(\ubd84\ud560\uacb0\uc81c)(\uc2b9\uc778\uc815\ubcf4 \ud68c\uc0c9)\n\n\ub2e4\uc218\uacb0\uc81c\ub780?\n\ub3d9\uc77c \ub0a0\uc9dc&\ub3d9\uc77c \uce74\ub4dc&\ub3d9\uc77c \uac00\ub9f9\uc810\uc5d0\uc11c 2\ud68c \uc774\uc0c1 \uacb0\uc81c\ud55c \uacbd\uc6b0\n\uc791\uc131 \ubc29\ubc95\n\ub2e4\uc218\uacb0\uc81c \uc804\ud45c\ub294 \ub3d9\uc77c\ud55c \uacc4\uc815 \uc0ac\uc6a9\nCASE 1\n\uce74\ub4dc/\uc608\uc0b0\uc744 \ub2ec\ub9ac\ud558\uc5ec 2\ud68c \uc774\uc0c1 \ubd84\ud560\uacb0\uc81c \uae08\uc9c0\n\uacb0\uc81c \ucd1d\uc561\uc5d0 \uad00\uacc4\uc5c6\uc774 \ubd84\ud560\uacb0\uc81c \uae08\uc9c0\n(\uc608) 23\ub144 11\uc6d4 3\uc77c, \uac00\ub9f9\uc810 \uac11. 20,000\uc6d0\uc744 2\ubc88\uc73c\ub85c \ub098\ub204\uc5b4\uc11c \uacb0\uc81c\n-A\uc804\ud45c: \ud68c\uc758\ube44 10,000\uc6d0\n-B\uc804\ud45c: \ubd80\uc11c\uc6b4\uc601\ube44 10,000\uc6d0\n\ube44\uc6a9\ucc98\ub9ac \ubd88\uac00\nCASE 2\n\uacb0\uc7ac\uc120 \uc0c1\ud5a5\uc744 \ud68c\ud53c\ud558\uae30 \uc704\ud55c \ubd84\ud560\uacb0\uc81c \uae08\uc9c0\n(\uc608) 23\ub144 11\uc6d4 3\uc77c. \uac00\ub9f9\uc810 \uac11. 300,000\uc6d0\uc744 2\ubc88\uc73c\ub85c \ub098\ub204\uc5b4\uc11c \uacb0\uc81c\n-A\uc804\ud45c: \ud68c\uc758\ube44 150,000\uc6d0\n-B\uc804\ud45c: \ud68c\uc758\ube44 150,000\uc6d0\n\ube44\uc6a9\ucc98\ub9ac \ubd88\uac00\n\uc0ac\ud6c4 \uc911\uc810\n\ubaa8\ub2c8\ud130\ub9c1 \ub300\uc0c1\n\ubd84\ud560\uacb0\uc81c \ubaa8\ub2c8\ud130\ub9c1 \ud68c\ud53c\ub97c \ubaa9\uc801\uc73c\ub85c \uc2dc\ucc28\ub97c \ub450\uace0 \uc804\ud45c\ub97c \uc0dd\uc131\ud558\ub294 \uacbd\uc6b0\n\ub3d9\uc77c \ub0a0\uc9dc\uc5d0 2\ud68c \uc774\uc0c1 \ubd84\ud560\uacb0\uc81c \ud6c4, \ub2e4\ub978 \ub0a0\uc9dc\uc5d0 \ucde8\uc18c\ud558\uace0 \uc7ac\uacb0\uc81c\ud558\ub294 \uacbd\uc6b0\n\uc801\ubc1c \uc2dc \ud328\ub110\ud2f0 \ubd80\uacfc\n\n\ub2e4\uc218\uacb0\uc81c(\ubd84\ud560\uacb0\uc81c)\n\n\ucc38\uace0. KIMS \ub2e4\uc218\uacb0\uc81c \ud45c\uc2dc \ud654\uba74\n\n\ub2e4\uc218\uacb0\uc81c\uc758 \uacbd\uc6b0, \uc2b9\uc778\uc815\ubcf4 \ud68c\uc0c9 \uc74c\uc601 \ud45c\uae30\n\n\ub2e4\uc218\uacb0\uc81c \ud45c\uae30\n\n## Slide 8\n\nCASE 1\n\uac19\uc740 \ub2ec\uc5d0 \ub3d9\uc77c \uae08\uc561\uc73c\ub85c \uac c0b0 (\uc608) \ud68c\uacc4\ud300 \ubd80\uc11c\uc6b4\uc601\ube44 \uc815\uc0b0\n\ub2e8, \uc5c5\uc885\uc774 '\uc8fc\uc810, \uce75\ud14c\uc77c\ubc14'\uc778\u00a0\uacbd\uc6b0 '\uc0ac\uc6a9\ubaa9\uc801, \ucc38\uc11d\uc790, \uc778\uc6d0\uc218' \uae30\uc7ac \ud544\uc694 \n    (\uc608) \ud68c\uacc4\ud300 \ubd80\uc11c\uc6b4\uc601\ube44_\ubd80\uc11c\ud68c\uc2dd_\ud64d\uae38\ub3d9 \uc678 2\uba85\n\ud68c\uc758\ube44\n\ud68c\uc758\uba85, \ud68c\uc758\ucc38\uc11d\uc790\uba85 \ubc0f \uc778\uc6d0\n \ucc38\uc11d\uc790\uba85 : kt alpha \uc9c1\uc6d0 / \uc778\uc6d0 : \ub0b4\u2219\uc678\ubd80\uc778\uc6d0 \uac01\uac01 \uc778\uc6d0 \uc218 \uae30\uc7ac\n(\uc608) 1\ub4f1\uc804\ub7b5\ud68c\uc758, \ud64d\uae38\ub3d9 \uc678 9\uba85\n\uc870\uc9c1\uc6b4\uc601\ube44\n\ucc38\uc11d \ubd80\uc11c/\uc9c1\uc6d0 \uae30\uc7ac (\uc608) \uc870\uc9c1\uc6b4\uc601\ube44_\ud68c\uacc4\ud300 \uc624\ucc2c\n\uc811\ub300\ube44\n\uc811\ub300\ubaa9\uc801, \uac70\ub798\ucc98 \ucc38\uc11d\uc790, kt alpha \ucc38\uc11d\uc790 \uae30\uc7ac\n   (\uc608) \ud68c\uacc4\ud300 \uc811\ub300\ube44_[\uc811\ub300\ubaa9\uc801][\uac70\ub798\ucc98\uba85\uacfc \uac70\ub798\ucc98\ucc38\uc11d\uc790][\ub2f9\uc0ac \ucc38\uc11d\uc790]\nFCPA, \uccad\ud0c1\uae08\uc9c0\ubc95 \uc801\uc6a9 \ub300\uc0c1\uc790\uc758 \uacbd\uc6b0 \uc131\uba85 \ubaa8\ub450 \uae30\uc7ac\n\n\ud68c\uc758\ub85d \uc791\uc131 \ubc29\ubc95\n\ud68c\uc758\ub85d \uc591\uc2dd\n\ud68c\uc758\uba85: \ud68c\uc758\uba85 \uad6c\uccb4\uc801 \uae30\uc7ac\n\uacf5\uc720 \ubb38\uc11c: \uc5c6\ub294 \uacbd\uc6b0, \uc5c6\uc74c\uc73c\ub85c \uae30\uc7ac\n\ub0a0\uc9dc/\uc2dc\uac04: \uc77c\uc2dc \uae30\uc7ac\n\uc7a5 \uc18c: \ud68c\uc758 \uc7a5\uc18c \uae30\uc7ac\n\uc791\uc131\uc790: \ud68c\uc758\ub85d \uc791\uc131\uc790 \uc131\uba85\n\ucc38\uc11d\uc790: kt alpha \uc9c1\uc6d0, \uc678\ubd80 \uc5c5\uccb4\uba85, \uac01\uac01 \ub300\ud45c\uc790\uba85, \ucc38\uc11d\uc778\uc6d0 \uc218 \uae30\uc7ac\n\ud68c\uc758\ub0b4\uc6a9:\n- \ud68c\uc758/\ud611\uc758 \ub0b4\uc6a9 \uae30\uc7ac(3\uc904\uc774\uc0c1)\n\n## Slide 10\n\n2.2 \uacc4\uc815 \ubc0f \uc5c5\uc885\ubcc4 \ud2b9\uc774\uc0ac\ud56d\n\n\ud2b9\uc774\uc0ac\ud56d - \uacc4\uc815\ubcc4\n\n\uacc4\uc815\uacfc\ubaa9\uba85\n\ub0b4\uc6a9\n\uc5ec\ube44\uad50\ud1b5\ube44\n\ucd9c\uc7a5 \uc804, \uc778\uc0ac\ud300 \uacf5\uc9c0 \ud655\uc778 \ud544\uc218 (\ucd9c\uc7a5\ube44 \ud55c\ub3c4 \ubc0f \uad50\ud1b5\uc218\ub2e8 \uc720\ud615\uc5d0 \ub530\ub978 \uc9c0\uc6d0 \uac00\ub2a5 \uc5ec\ubd80 \ub4f1 \ud655\uc778 \ud544\uc218)\n\uc18c\ubaa8\ud488\ube44\n\uae30\uc548 \ucca8\ubd80 \ud544\uc218\n\uc870\uc0ac\ubd84\uc11d\ube44\n\uae30\uc548 \ucca8\ubd80 \ud544\uc218\n\n\uc5c5\uc885\n\ub0b4\uc6a9\n\uace8\ud504\uacbd\uae30\uc7a5\n\uc0ac\uc804 \ud488\uc758, \uc0ac\ud6c4 \ud488\uc758 \uc791\uc131 \ud544\uc218\n\uc778\ud130\ub137P/G\n\t\ubc30\ub2ec\uc758 \ubbfc\uc871, \ucfe0\ud321\uc774\uce20, SSG\ub2f7\ucef4, \ub9c8\ucf13\uceec\ub9ac, \ucfe0\ud321 \ub4f1\uc5d0\uc11c \uacb0\uc81c \uc2dc \uad6c\ub9e4\ubaa9\ub85d\uc774 \uae30\uc7ac\ub41c \uc601\uc218\uc99d + \uc2e0\uc6a9\uce74\ub4dc\ub9e4\ucd9c\uc804\ud45c \ucca8\ubd80 \ud544\uc218\n\ubc31\ud654\uc810, \ub300\ud615\ud560\uc778\uc810, \uc288\ud37c\ub9c8\ucf13 \ub4f1\n\uad6c\ub9e4\ubaa9\ub85d\uc774 \uae30\uc7ac\ub41c \uc601\uc218\uc99d + \uc2e0\uc6a9\uce74\ub4dc\ub9e4\ucd9c\uc804\ud45c \ucca8\ubd80 \ud544\uc218\n\uc8fc\uc810, \uce75\ud14c\uc77c\ubc14 \ub4f1\n\ud68c\uc758\ube44 \uacc4\uc815 \uc774\uc6a9 \uc2dc \ud68c\uc758\ub85d \ucca8\ubd80 \ud544\uc218\n\n\ud2b9\uc774\uc0ac\ud56d - \uc5c5\uc885\ubcc4\n\n## Slide 11\n\n2.3 \uc99d\ube59 \ucca8\ubd80 \uc0ac\ub840\n\n\ucca8\ubd80 \uc99d\ube59\n\uc0ac\ub840\n\uc99d\ube59 \ub0b4\uc5ed\n\uad00\ub828 \ud488\uc758\n\uad11\uace0\uc120\uc804\ube44_\uae30\ud0c0/\ub9e4\uccb4/\ucee4\uba38\uc2a4\n\ubcf5\ub9ac\ud6c4\uc0dd\ube44_\ud3ec\uc0c1\ube44\n\ud589\uc0ac\ube44_\uc774\ubca4\ud2b8\n\ud589\uc0ac \ubaa9\uc801/\uc0ac\uc720/\uae30\uac04/\uc77c\uc2dc/\n\ud3ec\uc0c1/\ud504\ub85c\ubaa8\uc158 \uc0c1\uc138 (\uc9c0\uae09\ubc29\uc2dd, \uacbd\ud488, \ub300\uc0c1\uc790 \ub4f1)/\uc608\uc0c1 \ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\ubcf5\ub9ac\ud6c4\uc0dd\ube44_\uae30\ud0c0/\uc0ac\ub0b4\ud589\uc0ac\ube44\n\ud589\uc0ac\ube44_\uae30\ud0c0\n\ud589\uc0ac \ubaa9\uc801/\ud589\uc0ac \uae30\uac04/\n\uc608\uc0c1 \ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\uace8\ud504\n\uc77c\uc2dc/\uc7a5\uc18c/\ubaa9\uc801/\ucc38\uc11d\uc790/\n\uc608\uc0c1 \ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\ubcf5\ub9ac\ud6c4\uc0dd\ube44_\uc6cc\ud06c\uc0f5\n\uc77c\uc2dc/\uc7a5\uc18c/\n\ucc38\uc11d\uc778\uc6d0 (\ucc38\uc11d \ubd80\uc11c)/\n\uc608\uc0c1 \ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\uc9c0\uae09\uc218\uc218\ub8cc_\uae30\ud0c0\n\uc9c0\uae09 \ubaa9\uc801/\uc0ac\uc720/\n\uac70\ub798\ucc98 \uc601\uc218\uc99d/\n\uc608\uc0c1 \ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\uc9c0\uae09\uc218\uc218\ub8cc_\uc6b0\ud3b8\ubb3c\n\ubc1c\uc1a1 \ubaa9\uc801/\uc0ac\uc720/\n\ubc1c\uc1a1 \ubb3c\ud488 \ubc0f \ub0b4\uc5ed/\n\uc601\uc218\uc99d/\uacac\uc801\uc11c/\n\ube44\uc6a9 (\uacc4\uc815\uba85, \uae08\uc561)\n\uad00\ub828 \ud488\uc758\n- \uc804\uc790\uacb0\uc7ac \uc591\uc2dd\ud568 \ucc38\uace0\n\uad50\uc721\ud6c8\ub828\ube44_\uae30\ud0c0/\uc9c1\ubb34\uad50\uc721\n\uc0ac\uc678\uad50\uc721 \uc2e0\uccad\uc11c, \uacb0\uacfc \ubcf4\uace0\uc11c\n\uc5ec\ube44\uad50\ud1b5\ube44_\ud574\uc678/\uad6d\ub0b4\n\ucd9c\uc7a5\uacb0\uacfc\ubcf4\uace0\uc11c (\uc815\uc0b0\ub0b4\uc5ed\uc11c, \uc601\uc218\uc99d \ucca8\ubd80)\n\u2022 \uad00\ub828 \ud488\uc758\n- srm \uad6c\ub9e4/\uacc4\uc57d\uc694\uccad \ucc38\uace0\n\ub3c4\uc11c\uc778\uc1c4\ube44_\ub3c4\uc11c\uad6c\uc785\ube44/\uae30\ud0c0\uc778\uc1c4\nSRM \uad6c\ub9e4 \uae30\uc548 \uc791\uc131\n(\ubb38\uc758\ucc98 : \uacbd\uc601\uc9c0\uc6d0\ud300)\n\uc18c\ubaa8\ud488\ube44_\uc804\uc0b0/\uc77c\ubc18\n\ud68c\uc758\ub85d\n\uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798\uc720\ud615 (\uc2b9\uc778\uc815\ubcf4 \ub178\ub780\uc0c9) \ud639\uc740 \uce74\ub4dc \uc2b9\uc778\ub0b4\uc5ed\uc758 \uc5c5\uc885\uc774 \uc8fc\uc810, \uce75\ud14c\uc77c\ubc14 \ub4f1\uc778 \uacbd\uc6b0 \n\ud68c\uc758\ub85d \uc591\uc2dd \uc900\uc218\ud55c \ud68c\uc758\ub85d \ucca8\ubd80 \ud544\uc218\n\uc601\uc218\uc99d\n- \uce74\ub4dc \uc2b9\uc778\ub0b4\uc5ed\uc758 \uc5c5\uc885 \uae30\uc900\n\ub9c8\ud2b8, \uc288\ud37c\ub9c8\ucf13, \ubb38\uad6c\uc6a9\ud488\uc810, \ubc31\ud654\uc810, \ud3b8\uc758\uc810, \uc5f0\uc1c4\uc810, \uae30\ud0c0 \ube44\uc601\ub9ac \uc720\ud1b5 \ub4f1\n\uad6c\ub9e4 \ubaa9\ub85d (\ub2f4\ubc30 \ub4f1 \uc0ac\uc801 \uc0ac\uc6a9 \uae08\uc9c0)\n\uc778\ud130\ub137P/G \ud639\uc740 \ud574\uc678\uc0ac\uc6a9\ucc98\n\uc2e4\uc81c \ud310\ub9e4\uc790 \uc815\ubcf4 (\uc0c1\ud638, \uc0ac\uc5c5\uc790\ubc88\ud638)\n\ub808\uc800, \ubb38\ud654, \ucde8\ubbf8, \ub178\ub798\ubc29\n\uacb0\uc81c \ub0b4\uc5ed (\uc5c5\ubb34 \uad00\ub828 \uc81c\ud55c \uc815\uc0b0 \uac00\ub2a5)\n* \uc784\ub300 \uc0ac\uc5c5\uccb4\uc758 \ub9e4\uc7a5\uc744 \uc774\uc6a9\ud558\ub294 \uacbd\uc6b0 \uc2e4\uc81c \uc774\uc6a9\uc5c5\uc885\uacfc \uc2b9\uc778\uc815\ubcf4 \uc0c1 \uc5c5\uc885 \ubd88\uc77c\uce58\uac00 \ubc1c\uc0dd\ud560 \uc218 \uc788\uc73c\ub2c8 \ubaa8\ub4e0 \uac70\ub798\ucc98\uc758 \uc601\uc218\uc99d \uc218\ucde8/\ubcf4\uad00 \uad8c\uace0\u00a0(\ud638\ud154 \u5167 \ubca0\uc774\ucee4\ub9ac \ub4f1)\n\n10\n\n## Slide 12\n\n2.4 \ubd80\uac00\uc138 \uc815\ubcf4 \u2460 \uacf5\uc81c / \ubd88\uacf5\uc81c \ub300\uc0c1\n\n\ub9e4\uc785\ubd80\uac00\uc138 \uacf5\uc81c / \ubd88\uacf5\uc81c \ub300\uc0c1\n\n\uc0ac\uc5c5\uc790(\uacf5\uae09\uc790) \uc720\ud615\ubcc4\n\uc0ac\uc5c5\uc790\n\uacfc\uc138 \uc0ac\uc5c5\uc790\n\uba74\uc138 \uc0ac\uc5c5\uc790\n\uc77c\ubc18 \uacfc\uc138\uc790\n\uac04\uc774 \uacfc\uc138\uc790\n\ub9e4\uc785\uc138\uc561 \uacf5\uc81c \uac00\ub2a5\n\ub9e4\uc785\uc138\uc561 \uacf5\uc81c \ubd88\uac00\n\ube44\uc6a9\uc131\uaca9\ubcc4 (\uacc4\uc815\uacfc\ubaa9)\n\uc5c5\ubb34 \ud611\uc758\ub97c \uc704\ud55c \ud68c\uc758\ube44 \uc131\uaca9\uc758 \uacbd\ube44, \ubcf5\ub9ac\ud6c4\uc0dd \ubaa9\uc801 \uacbd\ube44, \uc18c\ubaa8\ud488 \uad6c\ub9e4 \ub300\ub0b4\uc6a9 \uacbd\ube44 \ub4f1\n\ub9e4\uc785\uc138\uc561 \uacf5\uc81c \uac00\ub2a5\n\uc0ac\uc5c5\uacfc \uc9c1\uc811 \uad00\ub828\uc774 \uc5c6\ub294 \uc9c0\ucd9c\uc5d0 \ub300\ud55c \ub9e4\uc785\uc138\uc561 \ub4f1\n\u3147 \uc5ec\ube44\uad50\ud1b5\ube44_\uad6d\ub0b4/\ud574\uc678, \ucc28\ub7c9\uc720\uc9c0\ube44_\uc784\uc6d0/\uc601\uc5c5, \uc811\ub300\ube44_\uc784\uc6d0/\uc601\uc5c5\n\u3147 \ubd80\uac00\uc138 \ubd88\uacf5\uc81c \ucc98\ub9ac \uac74\uc740 \uacc4\uc815\uacfc\ubaa9 \ubc0f \uc131\uaca9\uc774 \ub3d9\uc77c\ud55c \uacbd\uc6b0, \uc2b9\uc778\ub0b4\uc5ed \uc77c\uad04 \ucc98\ub9ac \uac00\ub2a5\n\ub9e4\uc785\uc138\uc561 \uacf5\uc81c \ubd88\uac00\n\n\ucc38\uace0. \ubd80\uac00\uc138 \ubd88\uacf5\uc81c \uc804\ud45c \ucc98\ub9ac \ud654\uba74\n\n11\n\n\uccb4\ud06c\ubc15\uc2a4 \ud574\uc81c\n\n\ubd80\uac00\uc138\ucf54\ub4dc \uacf5\ub780\n\n## Slide 13\n\n\ubd80\uac00\uc138 \uc815\ubcf4 \uc785\ub825\n\n\uce74\ub4dc\uc2b9\uc778\ub0b4\uc5ed\n\n2.4 \ubd80\uac00\uc138 \uc815\ubcf4 \u2461 \uc804\ud45c \uc791\uc131 \ud654\uba74 : \uc601\uc218\uc99d\uacfc \uce74\ub4dc\uc2b9\uc778\ub0b4\uc5ed \ubd88\uc77c\uce58 \uc0ac\ub840\n\n\uc601\uc218\uc99d\n\n[\uc8fc\uc758] \uac00\ub9f9\uc810(\uc0ac\uc5c5\uc790\ubc88\ud638)2\uc5d0\ub294 \uc22b\uc790\ub9cc \uc785\ub825\n\n12\n\n## Slide 14\n\n\ubd80\uac00\uc138 \uc815\ubcf4 \uc785\ub825\n\n\uce74\ub4dc\uc2b9\uc778\ub0b4\uc5ed\n\n2.4 \ubd80\uac00\uc138 \uc815\ubcf4 \u2462 \uc804\ud45c \uc791\uc131 \ud654\uba74 : \uba74\uc138, \uacfc\uc138 \uae08\uc561 \ubd84\ub9ac \uc0ac\ub840\n\n\uc601\uc218\uc99d\n\n\u3147\u3147\ub9c8\ud2b8\n\n1,600\t1,454\n\n146\n\n1,454\n\n146\n\n1,600\n\n13\n\n\uba74\uc138\n\n\uacfc\uc138\n\n## Slide 15\n\n\uc804\ud45c \uc791\uc131 \uae30\ud55c\n\uce74\ub4dc \uac70\ub798\uac00 \ubc1c\uc0dd\ud55c \ud574\ub2f9\uc77c\ub85c\ubd80\ud130 D+5\uc77c \uc774\ub0b4\uc5d0 \uc804\ud45c\uc791\uc131\uc744 \ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4.\n\ud2b9\ud788 \uc6d4 \ub9c8\uac10 \uc774\ud6c4\uc5d0 \uc804\ud45c \uc791\uc131 \ub204\ub77d \uac74\uc740 \ucd94\uac00 \ucc98\ub9ac\uac00 \ubd88\uac00\ud568\uc744 \uc720\uc758 \ubc14\ub78d\ub2c8\ub2e4.\n2.   \uc804\ud45c \uae30\ubcf8 \uacb0\uc7ac\uc120\n[\ubc95\uc778\uce74\ub4dc] \n\uc804\ud45c \uc791\uc131\uc790 \u2192 \uc608\uc0b0 \uc0ac\uc6a9 \ubd80\uc11c\uc7a5 \u2192 \uacb0\uc7ac\uc120 \uc0c1\ud5a5 \uc2dc \uc0c1\uc704\uacb0\uc7ac\uc790 \u2192 \ud68c\uacc4\ud300\uc6d0 \u2192 \ud68c\uacc4\ud300\uc7a5\n[\uc720\ubb34\ud615\uc790\uc0b0\uad6c\ub9e4: \ud68c\uacc4\ud300 \uc790\uc0b0 \ub2f4\ub2f9\uc790 \uacb0\uc7ac\uc120 \ucd94\uac00]\n\uc804\ud45c \uc791\uc131\uc790 \u2192 \uc608\uc0b0 \uc0ac\uc6a9 \ubd80\uc11c\uc7a5 \ud639\uc740 \uad00\ub828 \ubd80\uc11c\uc7a5 \u2192 \ud68c\uacc4\ud300 \uc790\uc0b0 \ub2f4\ub2f9\uc790 \u2192 \ud68c\uacc4\ud300\uc6d0 \u2192 \ud68c\uacc4\ud300\uc7a5\n3.   \uc601\uc218\uc99d\n\ucca8\ubd80\ud574\uc8fc\uc2e0 \uc601\uc218\uc99d\uc740 \ub0a0\uc9dc \ubc0f \uc2dc\uac04, \uc0ac\uc5c5\uc790\ub4f1\ub85d\ubc88\ud638, \uac70\ub798\ucc98\uba85, \uae08\uc561\uc774 \uc2dd\ubcc4 \uac00\ub2a5\ud558\uc5ec\uc57c \ud569\ub2c8\ub2e4.\n\ucc98\ub9ac \ubd88\uac00\ub2a5 \uc601\uc218\uc99d \uc608\uc2dc\na. \ucd08\uc810\uc774 \ub9de\uc9c0 \uc54a\uc544\uc694\u2026\nb. \uc6d0\uc2ec\ubd84\ub9ac\nc. \ucd95\ucd95\u2026(\ubcf4\uad00\uc758\uc911\uc694\uc131)\nd. \u00bd\n\n\ucc38\uace0\uc0ac\ud56d\n\n14\n\n## Slide 16\n\nFAQ \n\nQ1. \ubaa8\ub4e0 \ud68c\uc758\ube44 \uc804\ud45c\uc5d0 \ud68c\uc758\ub85d\uc744 \ucca8\ubd80\ud574\uc57c \ud558\ub098\uc694?\n\ubaa8\ub4e0 \ud68c\uc758\ube44 \uc804\ud45c\uac00 \ud68c\uc758\ub85d \ucca8\ubd80 \ub300\uc0c1\uc740 \uc544\ub2d9\ub2c8\ub2e4. \ub2e4\ub9cc, \uc0ac\uc6a9\uc8fc\uc758 \uac70\ub798\uc720\ud615(\uc2b9\uc778\uc815\ubcf4\uac00 \ub178\ub780\uc0c9\uc778 \uacbd\uc6b0) \ud639\uc740 \uce74\ub4dc \uc2b9\uc778\ub0b4\uc5ed\uc758 \uc5c5\uc885\uc774 \uc8fc\uc810, \uce75\ud14c\uc77c\ubc14 \ub4f1\uc778 \uacbd\uc6b0 \ud68c\uc758\ub85d \uc791\uc131 \ud6c4 \uc804\ud45c\uc5d0 \ucca8\ubd80 \ud558\uc154\uc57c \ud569\ub2c8\ub2e4.\nQ2. \ud300\uc7a5\ub2d8\uc774 \ubcf8\ubd80\uc7a5 \uacb8\uc9c1\uc744 \ud558\uace0 \uacc4\uc2e0 \uacbd\uc6b0, \uacb0\uc7ac\uc120 \uc0c1\ud5a5 \uc2dc(\uc2b9\uc778\uc815\ubcf4 \ub178\ub780\uc0c9\uc778 \uacbd\uc6b0) \uc5b4\ub514\uae4c\uc9c0 \uc0c1\ud5a5\ud574\uc57c \ud560\uae4c\uc694?\n\uacb0\uc7ac\uc120\uc740 \uc608\uc0b0 \uc0ac\uc6a9\ubd80\uc11c(CO\uc13c\ud130) \uae30\uc900\uc758 \uacb0\uc7ac \ub808\ubca8\ub85c \uc801\uc6a9\ub418\uba70, \ud574\ub2f9 \uacbd\uc6b0\uc5d0\ub294 \uc544\ub798\uc640 \uac19\uc774 \uc791\uc131\ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4.\n     \uc804\ud45c \uc791\uc131\uc790 \u2192 \uc608\uc0b0 \uc0ac\uc6a9 \ubd80\uc11c \ud300\uc7a5(\ubcf8\ubd80\uc7a5) \u2192 \ud68c\uacc4\ud300\uc6d0 \u2192 \ud68c\uacc4\ud300\uc7a5\nQ3. \ub2e4\uc218\uacb0\uc81c \uc804\ud45c \ucc98\ub9ac \uc2dc \uc720\uc758\uc0ac\ud56d\uc774 \uc788\ub098\uc694?\n\ub3d9\uc77c \uac00\ub9f9\uc810\uc5d0\uc11c \uac19\uc740 \ub0a0 \ub3d9\uc77c \uc2dc\uac04\ub300\uc5d0 \uacb0\uc81c\ud55c \uacbd\uc6b0 \uc2b9\uc778\uc815\ubcf4\uac00 \ud68c\uc0c9\uc73c\ub85c \ud45c\uae30\ub418\uace0 \uac80\uc99d\ub300\uc0c1\uc5d0 \ub2e4\uc218\uacb0\uc81c\ub85c \ud45c\uae30\ub429\ub2c8\ub2e4. \ud574\ub2f9 \uac74\ub4e4\uc740 \ub3d9\uc77c\ud55c \ubaa9\uc801\uc73c\ub85c \uc0ac\uc6a9\ub41c \uac74\uc774\ubbc0\ub85c \uc804\ud45c\ub4e4\uc5d0 \ub3d9\uc77c\ud55c \uacc4\uc815\uc744 \uc0ac\uc6a9\ud558\uc154\uc57c \ud569\ub2c8\ub2e4.\nQ4. \uce74\ub4dc \ub300\uae08\uc774 \ub098\uac04 \ud6c4\uc5d0 \uc804\ud45c \ucc98\ub9ac\uac00 \uc548\ub41c \uac83\uc744 \uc778\uc9c0\ud588\uc2b5\ub2c8\ub2e4. \uc804\ud45c \uc791\uc131\uc774 \uac00\ub2a5\ud560\uae4c\uc694? \n\ubc95\uc778\uce74\ub4dc \uc804\ud45c\ub294 \uc2b9\uc778\uc77c \ud6c4 5\uc601\uc5c5\uc77c \ub0b4\uc5d0 \uc804\ud45c \uc791\uc131\uc744 \ud558\ub3c4\ub85d \uc548\ub0b4\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uce74\ub4dc \ub300\uae08\uc774 \ub098\uac04 \uacbd\uc6b0 \uc774\ubbf8 \uc6d4 \uacb0\uc0b0\uc774 \uc885\ub8cc\ub41c \uc2dc\uc810\uc774\uae30 \ub54c\ubb38\uc5d0 \ud574\ub2f9 \uac74\uc5d0 \ub300\ud574 \uc804\ud45c \ucc98\ub9ac\ub294 \uc5b4\ub835\uc2b5\ub2c8\ub2e4.\nQ5. \ubaa8\ub4e0 \ubd80\uc11c\uc6b4\uc601\ube44, \uc870\uc9c1\uc6b4\uc601\ube44, \ud68c\uc758\ube44 \uc804\ud45c\uc5d0 \uc601\uc218\uc99d\uc744 \ucca8\ubd80\ud574\uc57c \ud558\ub098\uc694? \n\uc74c\uc2dd\uc810\uc774\ub098 \uce74\ud398 \ub4f1\uc5d0\uc11c \uc774\uc6a9\ud558\uc2e0 \uac74\uc740 \uc601\uc218\uc99d\uc744 \ucca8\ubd80\ud558\uc9c0 \uc54a\uc73c\uc154\ub3c4 \ub429\ub2c8\ub2e4. \ub2e4\ub9cc, \uad6c\ub9e4 \ubb3c\ud488 \ub0b4\uc5ed \ud655\uc778\uc774 \ud544\uc694\ud55c \ub9c8\ud2b8, \ubb38\uad6c\uc6a9\ud488\uc810, \ubc31\ud654\uc810, \ud3b8\uc758\uc810, \uc778\ud130\ub137P/G, \ud574\uc678\uc0ac\uc6a9\ucc98 \ub4f1\uc758 \uacbd\uc6b0\uc640 \ub808\uc800, \ubb38\ud654, \ucde8\ubbf8, \ub178\ub798\ubc29 \uc5c5\uc885\uc778 \uacbd\uc6b0\uc5d0\ub294 \uc601\uc218\uc99d\uc744 \ucca8\ubd80\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4.\nQ6. \uce74\ub4dc \uacb0\uc81c \ud6c4 \uacb0\uc81c \ucde8\uc18c\ub97c \ud588\uc2b5\ub2c8\ub2e4. \uc804\ud45c\ub294 \uc5b4\ub5bb\uac8c \ucc98\ub9ac\ud560\uae4c\uc694?\n\uac19\uc740 \ub2ec\uc5d0 \ub3d9\uc77c \uae08\uc561\uc73c\ub85c \uacb0\uc81c \ud6c4 \ucde8\uc18c\ud558\uc2e0 \uacbd\uc6b0 \uacb0\uc81c \uac74\uacfc \ucde8\uc18c \uac74 \ubaa8\ub450 \uc804\ud45c \uc791\uc131\uc744 \ud558\uc9c0 \uc54a\uc73c\uc154\ub3c4 \ub429\ub2c8\ub2e4. \ub2e4\ub9cc, \uacb0\uc81c \uc804\ud45c\ub97c \uc791\uc131\ud558\uc2e0 \uacbd\uc6b0\ub098 \ubd80\ubd84 \ucde8\uc18c\uc758 \uacbd\uc6b0, \uadf8\ub9ac\uace0 \ud658\uc728\uc5d0 \ub530\ub77c \uae08\uc561\uc774 \ubc14\ub014 \uc218 \uc788\ub294 \ud574\uc678 \uacb0\uc81c \uac74\uc740 \uacb0\uc81c, \ucde8\uc18c \uc804\ud45c \ubaa8\ub450 \uac01\uac01 \uc791\uc131\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4. \ucde8\uc18c \uc804\ud45c \uc791\uc131 \uc2dc\uc5d0\ub294 \uacb0\uc7ac\uc694\uccad\uc0ac\ud56d\uc5d0 \uacb0\uc81c \uc804\ud45c\uc758 SAP\uc804\ud45c\ubc88\ud638\ub97c \uae30\uc785\ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4.\n\n15\n\n## Slide 17\n\nFAQ\n\nQ7. \ubc95\uc778\uce74\ub4dc\ub85c \uacb0\uc81c\ud55c \uc8fc\ucc28\uc7a5, \ud0dd\uc2dc \ube44\uc6a9\uc740 \uc5b4\ub5bb\uac8c \ucc98\ub9ac\ud560\uae4c\uc694?\n(\ucd9c\uc7a5\ube44 \uc678) \uad50\ud1b5\ube44 \uc815\uc0b0 \uac74\uc785\ub2c8\ub2e4. \uc5c5\ubb34\uc9c0\uc6d0 >\u00a0\uad50\ud1b5\ube44 \uba54\ub274\ub97c \uc774\uc6a9\ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4. (\uc5c5\ubb34\uac00\uc774\ub4dcTIP > 02.\ud589\uc815\uc9c0\uc6d0 > 12.\uc2dc\ub0b4\uad50\ud1b5\ube44 \ucc38\uace0)\nQ8. \uc601\uc218\uc99d\uc744 \ubd84\uc2e4\ud55c \uacbd\uc6b0, \ud574\uacb0\ubc29\ubc95\uc774 \uc788\ub098\uc694?\n\uc601\uc218\uc99d \ubbf8\ucca8\ubd80 \uc601\ud5a5\uc73c\ub85c \ube44\uc6a9 \uc815\uc0b0\uc774 \uc5b4\ub824\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \ud574\ub2f9 \uac70\ub798\ucc98 \ubc29\ubb38 \uc2dc \uc601\uc218\uc99d \uc7ac\ubc1c\ud589\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4.\nQ9. \uc601\uc218\uc99d\uc5d0 \ubd80\uac00\uc138 \uc815\ubcf4\uac00 \ud45c\uc2dc\ub418\uc5b4 \uc788\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc5b4\ub5bb\uac8c \ucc98\ub9ac\ud560\uae4c\uc694?\n\ubd80\uac00\uc138 \ubd88\uacf5\uc81c \ub300\uc0c1\uc73c\ub85c \uc804\ud45c \uc791\uc131 \ucc3d\uc5d0\uc11c \ubd80\uac00\uc138\uacf5\uc81c \uccb4\ud06c\ubc15\uc2a4(\uc2b9\uc778\uc815\ubcf4) \ud574\uc81c, \ube44\uc6a9\uc815\ubcf4 \ub0b4 \ubd80\uac00\uc138\ucf54\ub4dc \uacf5\ub780\uc744 \uc120\ud0dd\ud558\uc154\uc11c \ubd80\uac00\uc138 \uae08\uc561 0\uc6d0\uc73c\ub85c \uc791\uc131\ud558\uc154\uc57c \ud569\ub2c8\ub2e4.\nQ10. \uc804\ud45c \uc791\uc131 \uc2dc, \uc2b9\uc778\uc815\ubcf4\uc758  '\uc2e4\uc0ac\uc6a9\uc790'\ub294 \ub204\uad6c\uc778\uac00\uc694?\n\uc2e4\uc0ac\uc6a9\uc790\ub294 \ubc95\uc778\uce74\ub4dc \uba85\uc758\uc790\ub85c \uc790\ub3d9 \uc9c0\uc815\ub418\uba70, \uacb0\uc7ac\uc120\uc5d0 \ud544\uc218\ub85c \ubc18\uc601\ub429\ub2c8\ub2e4. \uc2e4\uc0ac\uc6a9\uc790\uc5d0 \ud574\ub2f9 \uc804\ud45c\uc758 \uc608\uc0b0 \uc9d1\ud589 \ubd80\uc11c\uc7a5\ub2d8(\uc804\ud45c\uc0c1 \ube44\uc6a9\uc815\ubcf4-CO\uc13c\ud130\uc758 \uc7a5)\uc744 \uae30\uc785\ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4.(\uc608. CO\uc13c\ud130: \ud68c\uacc4\ud300 \u2192 CO\uc13c\ud130\uc7a5: \ud68c\uacc4\ud300\uc7a5)\nQ11. \ubc95\uc778\uce74\ub4dc\ub85c \ubb38\uad6c\uc6a9\ud488\uc810\uc5d0\uc11c \uc18c\ubaa8\ud488\uc744 \uad6c\ub9e4\ud558\uace0 \uc2f6\uc2b5\ub2c8\ub2e4. \uac00\ub2a5\ud55c\uac00\uc694?\n\uac00\uae09\uc801 \uacbd\uc601\uc9c0\uc6d0\ud300\uc744 \ud1b5\ud55c \uc18c\ubaa8\ud488 \uad6c\ub9e4\ub97c \uc9c4\ud589 \ubd80\ud0c1\ub4dc\ub9bd\ub2c8\ub2e4. \ubd80\ub4dd\uc774\ud55c \uacbd\uc6b0 \ubb38\uad6c\uc6a9\ud488\uc810\uc5d0\uc11c \uc18c\ubaa8\ud488\uc744 \uad6c\ub9e4\ud558\uc2e0 \ub54c\uc5d0\ub294 \uad6c\ub9e4 \ubaa9\uc801\uc744 \uae30\uc785\ud55c \uae30\uc548\uacfc \uad6c\ub9e4 \ubb3c\ud488 \ub0b4\uc5ed\uc744 \ud655\uc778\ud560 \uc218 \uc788\ub294 \uc601\uc218\uc99d\uc744 \uc804\ud45c\uc5d0 \ucca8\ubd80 \ud558\uc2dc\uace0 \uc18c\ubaa8\ud488\ube44 \uacc4\uc815\uc744 \uc774\uc6a9\ud574\uc8fc\uc2dc\uae30 \ubc14\ub78d\ub2c8\ub2e4.\nQ12. \uc5ec\ub7ec \uce74\ub4dc \uacb0\uc81c \uac74\uc744 \ud558\ub098\uc758 \uc804\ud45c\ub85c \ud55c \ubc88\uc5d0 \ucc98\ub9ac\ud560 \uc218 \uc5c6\ub098\uc694?\n\ubd80\uac00\uc138 \uc2e0\uace0\ub97c \uc704\ud574 \ubd80\uac00\uc138 \uacf5\uc81c \uac74\uc740 \uac01 \uc2b9\uc778 \uac74\ubcc4\ub85c \uc804\ud45c \ucc98\ub9ac\uac00 \ub418\uc5b4\uc57c\ud569\ub2c8\ub2e4. \ubc18\uba74 \ubd80\uac00\uc138 \ubd88\uacf5\uc81c \ubd80\uc11c\uc774\uac70\ub098, \ubd80\uac00\uc138 \uacf5\uc81c \ubd80\uc11c\uc774\ub354\ub77c\ub3c4 \ubd80\uac00\uc138 \ubd88\uacf5\uc81c \uacc4\uc815(\uc5ec\ube44\uad50\ud1b5\ube44, \ucc28\ub7c9\uc720\uc9c0\ube44)\uc744 \uc0ac\uc6a9\ud558\ub294 \uacbd\uc6b0\uc5d0\ub294 \uc5ec\ub7ec \uacb0\uc81c \uac74\uc744 \ud558\ub098\uc758 \uc804\ud45c\ub85c \ucc98\ub9ac\ud558\uc2e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4.\nQ13. \uc6cc\ud06c\uc0f5 \uc804\ud45c \uc791\uc131 \uc2dc \uc8fc\uc758\ud560 \uc810\uc774 \uc788\ub098\uc694?\n\uc6cc\ud06c\uc0f5\uc758 \uacbd\uc6b0 \uc601/\uc77c_\ubcf5\ub9ac\ud6c4\uc0dd\ube44_\uc6cc\ud06c\uc0f5 \uacc4\uc815\uc744 \uc774\uc6a9\ud558\uc154\uc57c \ud569\ub2c8\ub2e4. \uc804\ud45c\uc5d0\ub294 \uae30\uc548\uc744 \ucca8\ubd80\ud574\uc8fc\uc154\uc57c \ud558\uba70, \uae30\uc548\uc5d0\ub294 \uc6cc\ud06c\uc0f5 \uc77c\uc2dc/\uc7a5\uc18c/\ucc38\uc11d\uc778\uc6d0(\ucc38\uc11d \ubd80\uc11c)/\uc608\uc0c1 \ube44\uc6a9(\uacc4\uc815\uba85, \uae08\uc561)\uc744 \ud3ec\ud568\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4.\n\n16\n\n## Slide 18\n\nFAQ \n\nQ14. \ucd9c\uc7a5 \uc804\ud45c \uc791\uc131 \uc2dc \uc720\uc758\uc0ac\ud56d\uc774 \uc788\ub098\uc694?\n\ucd9c\uc7a5\ube44\ub294 \u2018\ud68c\uc0ac\uaddc\uc815 \ubc0f \ud45c\uc900-4.\uc778\uc0ac \ub178\ubb34-\uc5ec\ube44\uc9c0\uae09\uc2dc\ud589\uc138\uce59\u2019\uc5d0 \uaddc\uc815\ub41c \ud55c\ub3c4 \ub0b4\uc5d0\uc11c \uc774\uc6a9\ud574\uc57c \ud569\ub2c8\ub2e4. \ub2e4\ub9cc, \uc219\ubc15\ube44 \ucd08\uacfc \uc9c0\ucd9c \uc2dc\uc5d0\ub294  \ucd9c\uc7a5\uacb0\uacfc\ubcf4\uace0\uc11c\uc5d0 \ucd08\uacfc \uc0ac\uc720\ub97c \uae30\uc785\ud558\uc5ec \uc804\uacb0\uad8c\uc790\uc758 \uc2b9\uc778\uc744 \ub4dd\ud55c \uacbd\uc6b0\uc5d0 \ube44\uc6a9 \uc9c0\uae09\uc774 \uac00\ub2a5\ud569\ub2c8\ub2e4. \uc2dd\ube44 \ud55c\ub3c4\ub97c \ucd08\uacfc\ud558\uc5ec \uc0ac\uc6a9\ud55c \uacbd\uc6b0 \ud55c\ub3c4 \ub0b4 \uae08\uc561\uc740 \uc5ec\ube44\uad50\ud1b5\ube44 \uacc4\uc815\uc744 \uc0ac\uc6a9\ud558\uace0, \ucd08\uacfc\ubd84\uc5d0 \ub300\ud574\uc11c\ub294 \ud68c\uc758\ube44 \ucc98\ub9ac\uac00 \uac00\ub2a5\ud569\ub2c8\ub2e4. \uc5ec\ube44\uad50\ud1b5\ube44 \uacc4\uc815\uc740 \ubd80\uac00\uc138 \ubd88\uacf5\uc81c \uacc4\uc815\uc73c\ub85c \uc5ec\ub7ec \uacb0\uc81c \uac74\uc744 \ud558\ub098\uc758 \uc804\ud45c\ub85c \uc791\uc131\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4\ub9cc, \ud68c\uc758\ube44\uc758 \uacbd\uc6b0 \ubd80\uac00\uc138 \uacf5\uc81c\uac00 \uac00\ub2a5\ud558\uc5ec \uac01 \uacb0\uc81c \uac74\ubcc4\ub85c \uc804\ud45c \uc791\uc131\uc774 \ud544\uc694\ud569\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uc2dd\ube44\ub294 \ud604\uc9c0 \uc0ac\uc6a9\ubd84\ub9cc \uc778\uc815\ub418\uba70, \ucd9c\uc7a5 \uc804 \uc2dd\ub300\ub294 \uc778\uc815\ub418\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.(\uc608. \ucd9c\uad6d \uc804 \uacf5\ud56d\uc5d0\uc11c \uc2dd\uc0ac)\nQ15. \uc2b9\uc778\uc815\ubcf4\uac00 \ube68\uac04\uc0c9\uc778 \uacb0\uc81c \uac74\uc744 \uc804\ud45c \uc791\uc131\ud558\ub824\uace0 \ud558\ub2c8 \u2018\ubc95\uc778\uce74\ub4dc \uc804\ud45c\uc0dd\uc131 \ubd88\uac00 \uc5c5\uc885\ucf54\ub4dc\uc785\ub2c8\ub2e4. \ubc95\uc778\uce74\ub4dc \uc804\ud45c \uacb0\uc7ac \ub2f4\ub2f9\uc790\uc5d0\uac8c \ubb38\uc758\ud558\uc138\uc694.\u2019 \ub77c\ub294 \uc54c\ub9bc\ucc3d\uc774 \ub5b4\uc2b5\ub2c8\ub2e4. \uc774\ub7f0 \uacbd\uc6b0\uc5d0\ub294 \uc5b4\ub5bb\uac8c \ucc98\ub9ac\ud574\uc57c\ud558\ub098\uc694?\n\uc2b9\uc778\uc815\ubcf4\uac00 \ube68\uac04\uc0c9\uc778 \uc0ac\uc6a9 \uae08\uc9c0 \uc5c5\uc885\uc5d0\uc11c \uacb0\uc81c\ud558\uc2e0 \uac74\uc740 \ubc95\uc778\uce74\ub4dc \uc804\ud45c\ub85c \uc791\uc131\uc774 \ubd88\uac00\ud558\uace0 \uc77c\ubc18 \ube44\uc6a9 \uc804\ud45c(\uc804\ud45c\uc791\uc131-\ube44\uc6a9\ub4f1\ub85d-\uc2e0\uaddc)\ub85c \uc791\uc131\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4. \ub2e4\ub9cc, \uc0ac\uc6a9 \ubaa9\uc801/\uae08\uc561/\uacb0\uc81c\uc77c\uc2dc\ub97c \uae30\uc785\ud55c \uae30\uc548\uc744 \ubd80\ubb38\uc7a5/\uc2e4\uc7a5/\ucd1d\uad04\uae4c\uc9c0 \uacb0\uc7ac \ubc1b\uc73c\uc2e0 \ud6c4 \uc804\ud45c\uc5d0 \ucca8\ubd80\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4. \uc804\ud45c \uc791\uc131 \uc2dc \uac70\ub798\ucc98\ub294 \ubc95\uc778\uce74\ub4dc \uc804\ud45c \ucc98\ub9ac\uac00 \ubd88\uac00\ud588\ub358 \uce74\ub4dc\uc758 \uc18c\uc720\uc790\ub85c \ud574\uc8fc\uc2dc\uba74 \ub429\ub2c8\ub2e4.\nQ16. \uc2b9\uc778\uc815\ubcf4 \ub178\ub780\uc0c9\uc774 \ub728\ub294 \uae08\uc561\uc740 \uc5bc\ub9c8\uc778\uac00\uc694? \ub2f9\uc77c\uc5d0 \ud574\ub2f9 \uce74\ub4dc\ub85c \uc0ac\uc6a9\ud55c \uae08\uc561\uc774 \ud569\uc0b0\ub418\ub294 \uac83\uc778\uac00\uc694?\n\ub2f9\uc77c\uc5d0 \ud574\ub2f9 \uce74\ub4dc\ub85c \uc0ac\uc6a9\ud55c \uae08\uc561\uc744 \ud569\uc0b0\ud558\ub294 \uac83\uc740 \uc544\ub2c8\uba70, \ud55c \uac74\uc758 \uacb0\uc81c\uae08\uc561\uc774 30\ub9cc\uc6d0 \uc774\uc0c1\uc778 \uacbd\uc6b0\uc785\ub2c8\ub2e4. \nQ17. \uc601\uc218\uc99d \uc0ac\uc5c5\uc790\ubc88\ud638\uc640 \uc804\ud45c \ub0b4 \uc2b9\uc778\uc815\ubcf4\uc5d0 \uc788\ub294 \uc0ac\uc5c5\uc790\ubc88\ud638\uac00 \ub2ec\ub77c\uc11c \ubd80\uac00\uc138\uc815\ubcf4\ub97c \ucd94\uac00\ud558\uc5ec \uc601\uc218\uc99d\uc758 \uc0ac\uc5c5\uc790\ubc88\ud638\uc640 \uac00\ub9f9\uc810\uba85\uc744 \uc785\ub825\ud558\uc600\ub294\ub370 \u2018\ub4f1\ub85d\ub41c \uc0ac\uc5c5\uc790 \ubc88\ud638\uac00 \uc544\ub2d9\ub2c8\ub2e4\u2019\ub77c\ub294 \uc54c\ub9bc\ucc3d\uc774 \ub5b4\uc2b5\ub2c8\ub2e4. \ud574\uacb0\ubc29\ubc95\uc774 \ubb54\uac00\uc694?\n\uac00\ub9f9\uc810(\uc0ac\uc5c5\uc790\ubc88\ud638)2\uc5d0\ub294 \uc22b\uc790\ub9cc \uc785\ub825\ud574\uc8fc\uc154\uc57c \ud569\ub2c8\ub2e4. \ubc88\ud638 \uc0ac\uc774\uc5d0 \u2018-\u2019\ub97c \uc785\ub825\ud558\uc2dc\uba74 \uc624\ub958\uba54\uc138\uc9c0\uac00 \ub739\ub2c8\ub2e4. \nQ18. \ubd80\ub4dd\uc774\ud558\uac8c \ubc95\uc778\uce74\ub4dc\ub85c \uc0c1\ud488\uad8c\uc744 \uad6c\ub9e4\ud558\uc600\uc744 \ub54c, \ube44\uc6a9\ucc98\ub9ac\uac00 \uac00\ub2a5\ud55c\uac00\uc694? \n\ubc95\uc778\uce74\ub4dc\ub97c \ud1b5\ud55c \uc0c1\ud488\uad8c \uad6c\ub9e4\ub294 \uc6d0\uce59\uc801\uc73c\ub85c \uae08\uc9c0\ub429\ub2c8\ub2e4. \uc0c1\ud488\uad8c\uc744 \uad6c\ub9e4\ud55c \uacbd\uc6b0, \uc989\uc2dc \ud658\ubd88 \uc870\uce58\ud558\uac70\ub098 \uc0ac\uc6a9\uc790 \uac1c\uc778\uc774 \ube44\uc6a9\uc744 \ubd80\ub2f4\ud574\uc57c \ud569\ub2c8\ub2e4. \ubd88\uac00\ud53c\ud55c \uc0ac\uc720\ub85c \uc0c1\ud488\uad8c \uad6c\ub9e4\uac00 \ud544\uc694\ud55c \uacbd\uc6b0, \ubc18\ub4dc\uc2dc \uc0ac\uc804\uc5d0 \ud68c\uacc4\ud300 \ub2f4\ub2f9\uc790\uc5d0\uac8c \uace0\uc9c0\ud558\uace0 \ubd80\ubb38\uc7a5/\uacbd\uc601\uae30\ud68d\ucd1d\uad04 \uacb0\uc7ac\ub97c \ub4dd\ud55c \uae30\uc548\uc744 \ucca8\ubd80\ud574\uc57c \ud569\ub2c8\ub2e4. \ub610\ud55c \uc0c1\ud488\uad8c \uad6c\ub9e4\ub0b4\uc5ed \ubc0f \uc9c0\uae09 \ub300\uc0c1\uc790 \uc815\ubcf4\ub97c \ud3ec\ud568\ud55c \uc0c1\ud488\uad8c \uad00\ub9ac\ub300\uc7a5\uc744 \uc99d\ube59\uc73c\ub85c \ud544\ud788 \ucca8\ubd80\ud558\uc154\uc57c \ud569\ub2c8\ub2e4. \n\n17\n\n## Slide 19\n\n[\ubcc4\ucca8] \uacc4\uc815\uacfc\ubaa9 \uc815\uc758 (\uc601_ : \uc601\uc5c5\ube44\uc6a9-\uc0ac\uc5c5\ubd80\uc11c / \uc77c_: \uc77c\ubc18\uad00\ub9ac\ube44-STAFF\ubd80\uc11c)\n\n\uad6c\ubd84\n\uacc4\uc815 \uc815\uc758\n\uc138\ubd80\uacc4\uc815\n\uc138\ubd80\ub0b4\uc6a9\n\uad11\uace0\uc120\uc804\ube44\n\ud68c\uc0ac\uc758 \ub0b4\uc6a9\uc744 \uc120\uc804\ud64d\ubcf4 \ubc0f \uc0c1\ud488 \ub610\ub294 \uc81c\ud488\uc758 \ud310\ub9e4\ucd09\uc9c4\uc744\uc704\ud558\uc5ec \ubd88\ud2b9\uc815\ub2e4\uc218\uc778\uc744 \uc0c1\ub300\ub85c \ud558\ub294 \ube44\uc6a9\n\uae30\ud0c0\n\uae30\ud0c0\n\ub9e4\uccb4\n\ub9e4\uccb4\uad11\uace0\uc120\uc804\ube44\n\ube0c\ub85c\uc154\n\ube0c\ub85c\uc154\uc81c\uc791\ube44\n\ucee4\uba38\uc2a4\nKT\uc54c\ud30c\uc1fc\ud551 \uc0ac\uc5c5 \uad00\ub828 \uad11\uace0\uc120\uc804\ube44\n\ud310\ucd09\ubb3c\n\ud310\ucd09\ubb3c\uc81c\uc791\ube44\n\uad50\uc721\ud6c8\ub828\ube44\n\uc885\uc5c5\uc6d0\uc758 \uc778\uc801\uc790\uc6d0\uac1c\ubc1c\uc744 \uc704\ud55c \uad50\uc721/\ud6c8\ub828/\ud559\uc2b5\uad00\ub828 \uc81c\uacbd\ube44\n\uae30\ud0c0\n\uae30\ud0c0\n\uc9c1\ubb34\uad50\uc721\n\uc9c1\ubb34\uad50\uc721\n\ud574\uc678\n\ud574\uc678\uad50\uc721\n\ub3c4\uc11c\uc778\uc1c4\ube44\n\ub3c4\uc11c\uad6c\uc785\ube44\uc6a9 \ubc0f \uac01\uc885 \uac04\ud589\ubb3c\uc758 \ubc1c\uac04\ube44\uc6a9\n\uae30\ud0c0\uc778\uc1c4\n\uc778\uc1c4 \ube44\uc6a9\n\ub3c4\uc11c\uad6c\uc785\ube44\n\ub3c4\uc11c\uad6c\uc785\ube44\uc6a9\n\ubcf4\ud5d8\ub8cc\n\uc720\ud615\uc790\uc0b0\uc5d0 \ub300\ud55c \uc190\ud574(\ud654\uc7ac)\ubcf4\ud5d8\ub8cc, \uc784\uc9c1\uc6d0\uc5d0 \ub300\ud55c \ubcf4\uc99d\ubcf4\ud5d8\ub8cc \ubc0f \ud574\uc678\uc5ec\ud589\uc790\ubcf4\ud5d8\ub8 let messages = [];

function quickAsk(text) {
  document.getElementById("inputBox").value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function appendMessage(role, text) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message " + role;
  const avatar = document.createElement("div");
  avatar.className = "avatar " + role + "-avatar";
  avatar.textContent = role === "bot" ? "💳" : "👤";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = formatMessage(text);
  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  text = text.replace(/\[결론\]\s*(가능)/g, '<span class="result-label result-ok">✓ 가능</span>');
  text = text.replace(/\[결론\]\s*(불가)/g, '<span class="result-label result-no">✕ 불가</span>');
  text = text.replace(/\[결론\]\s*(조건부 가능)/g, '<span class="result-label result-cond">△ 조건부 가능</span>');
  text = text.replace(/\[결론\]\s*([^\n]+)/g, '<span class="result-label result-cond">$1</span>');
  text = text.replace(/\[(근거|필요 조치|주의사항)\]/g, '<div class="section-title">$1</div>');
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\n/g, "<br>");
  return text;
}

function showTyping() {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "message bot"; div.id = "typing";
  div.innerHTML = '<div class="avatar bot-avatar">💳</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById("inputBox");
  const text = input.value.trim();
  if (!text) return;
  input.value = ""; input.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;
  appendMessage("user", text);
  messages.push({ role: "user", content: text });
  showTyping();
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || "답변을 생성하지 못했습니다.";
    appendMessage("bot", reply);
    messages.push({ role: "assistant", content: reply });
  } catch (err) {
    removeTyping();
    appendMessage("bot", "오류가 발생했습니다. 잠시 후 다시 시도해 주세요.");
  }
  document.getElementById("sendBtn").disabled = false;
  document.getElementById("inputBox").focus();
}
</script>
